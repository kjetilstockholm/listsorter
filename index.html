<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Låtrankare</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; }
        h1 { color: #1DB954; margin: 0 0 15px 0; font-size: 22px; }
        h2 { color: #1DB954; margin: 0 0 10px 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
        .counter { font-size: 13px; font-weight: normal; color: #aaa; margin-left: 8px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 200px; gap: 15px; height: 100%; }
        .left-col { grid-column: 1; grid-row: 1 / 3; background: #282828; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
        .header-controls { background: #181818; padding: 12px; border-radius: 5px; margin-bottom: 15px; flex-shrink: 0; }
        select, input[type="file"] { background: #333; padding: 8px; border-radius: 5px; color: white; border: 1px solid #555; cursor: pointer; font-size: 14px; width: 100%; box-sizing: border-box; margin-top: 5px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 8px; }
        .main-export-btn { background: #1DB954; color: black; border: none; padding: 10px; flex-grow: 1; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .main-export-btn:hover { background: #1ed760; }
        .clear-btn { background: #e22134; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .clear-btn:hover { background: #c11b2b; }
        #spotify-player { margin-top: 15px; height: 80px; border-radius: 12px; overflow: hidden; flex-shrink: 0; display: none; background: #000; }
        .mid-col, .right-col { background: #282828; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
        .bottom-row { grid-column: 2 / 4; grid-row: 2; background: #282828; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
        .list-container { background: #181818; padding: 8px; border-radius: 5px; flex-grow: 1; overflow-y: auto; }
        #neutral-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; align-content: start; }
        .song { background: #333; padding: 6px 10px; margin-bottom: 4px; border-radius: 4px; cursor: grab; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; font-size: 13px; }
        .song:active { cursor: grabbing; background: #444; }
        .song:hover { background: #3e3e3e; }
        .song-info { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; cursor: help; }
        #top-list .song { border-left-color: #1DB954; }
        #bottom-list .song { border-left-color: #e22134; }
        #neutral-list .song { border-left-color: #888; margin-bottom: 0;}
        .play-btn { background: #1DB954; color: black; border: none; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
        .play-btn:hover { background: #1ed760; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="left-col">
            <h1>Sortera låtar? Yes!</h1>
            <div class="header-controls">
                <label style="font-size: 12px; color: #aaa;">1. Välj lista från servern</label>
                <select id="server-list-select">
                    <option value="">Laddar meny...</option>
                </select>

                <label style="font-size: 12px; color: #aaa;">...eller ladda upp från datorn</label>
                <input type="file" id="csv-upload" accept=".csv">
                
                <label style="font-size: 12px; color: #aaa; margin-top: 10px; display:block;">2. När du är klar</label>
                <div class="btn-group">
                    <button class="main-export-btn" onclick="exportAll()">Exportera Topp & Botten</button>
                    <button class="clear-btn" onclick="clearData()" title="Rensa aktuell lista">🗑️</button>
                </div>
            </div>
            <h2>Alla låtar <span id="all-counter" class="counter"></span></h2>
            <div id="all-songs" class="list-container"></div>
            <div id="spotify-player">
                <iframe id="sp-iframe" src="" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
            </div>
        </div>

        <div class="mid-col">
            <h2>Bästa 10 <span id="top-counter" class="counter"></span></h2>
            <div id="top-list" class="list-container"></div>
        </div>

        <div class="right-col">
            <h2>Sämsta 10 <span id="bottom-counter" class="counter"></span></h2>
            <div id="bottom-list" class="list-container"></div>
        </div>

        <div class="bottom-row">
            <h2>Menlösa <span id="neutral-counter" class="counter"></span></h2>
            <div id="neutral-list" class="list-container"></div>
        </div>
    </div>

    <script>
        let currentPlaylistId = "default"; 
        let currentPlaylistName = "Okänd lista";

        function updateCounters() {
            document.getElementById('all-counter').innerText = `(${document.getElementById('all-songs').children.length})`;
            document.getElementById('top-counter').innerText = `(${document.getElementById('top-list').children.length} tillagda)`;
            document.getElementById('bottom-counter').innerText = `(${document.getElementById('bottom-list').children.length} tillagda)`;
            document.getElementById('neutral-counter').innerText = `(${document.getElementById('neutral-list').children.length})`;
        }

        function saveState() {
            if(!currentPlaylistId) return;
            const listIds = ['all-songs', 'top-list', 'bottom-list', 'neutral-list'];
            const state = { playlistName: currentPlaylistName, lists: {} };

            listIds.forEach(id => {
                const songsElements = document.getElementById(id).querySelectorAll('.song');
                const songsData = Array.from(songsElements).map(song => ({
                    artist: song.getAttribute('data-artist'),
                    title: song.getAttribute('data-title'),
                    trackId: song.getAttribute('data-trackid') || ''
                }));
                state.lists[id] = songsData;
            });

            localStorage.setItem('spotifyRanking_' + currentPlaylistId, JSON.stringify(state));
            localStorage.setItem('spotifyRanking_lastActive', currentPlaylistId);
        }

        function loadState(playlistId) {
            const savedData = localStorage.getItem('spotifyRanking_' + playlistId);
            if (!savedData) return false;

            try {
                const state = JSON.parse(savedData);
                currentPlaylistName = state.playlistName;
                currentPlaylistId = playlistId;

                ['all-songs', 'top-list', 'bottom-list', 'neutral-list'].forEach(id => {
                    const container = document.getElementById(id);
                    container.innerHTML = ''; 
                    if (state.lists[id]) {
                        state.lists[id].forEach(songData => {
                            container.appendChild(createSongElement(songData.artist, songData.title, songData.trackId));
                        });
                    }
                });
                updateCounters();
                
                const selectEl = document.getElementById('server-list-select');
                if([...selectEl.options].some(opt => opt.value === playlistId)) {
                    selectEl.value = playlistId;
                }
                return true;
            } catch (e) {
                console.error("Kunde inte ladda data", e);
                return false;
            }
        }

        function clearData() {
            if(confirm('Är du säker på att du vill rensa denna lista och börja om?')) {
                localStorage.removeItem('spotifyRanking_' + currentPlaylistId);
                ['all-songs', 'top-list', 'bottom-list', 'neutral-list'].forEach(id => {
                    document.getElementById(id).innerHTML = '';
                });
                updateCounters();
            }
        }

        function createSongElement(artist, title, trackId) {
            const songDiv = document.createElement('div');
            songDiv.className = 'song';
            songDiv.setAttribute('data-artist', artist);
            songDiv.setAttribute('data-title', title);
            songDiv.setAttribute('data-trackid', trackId); 
            
            let playBtn = '';
            if (trackId) playBtn = `<button class="play-btn" onclick="playSong('${trackId}')">Spela</button>`;
            songDiv.innerHTML = `<span class="song-info" title="${artist} - ${title}">${getDisplayText(artist, title)}</span>${playBtn}`;
            return songDiv;
        }

        const sortableOptions = { group: 'shared', animation: 150, onSort: function() { updateCounters(); saveState(); } };
        new Sortable(document.getElementById('all-songs'), sortableOptions);
        new Sortable(document.getElementById('top-list'), sortableOptions);
        new Sortable(document.getElementById('neutral-list'), sortableOptions);
        new Sortable(document.getElementById('bottom-list'), sortableOptions);

        function getDisplayText(artist, title) {
            const MAX_LEN = 57;
            let targetA = artist.length; let targetT = title.length;
            if (targetA + targetT <= MAX_LEN) return `${artist} - ${title}`;
            while (targetA + targetT > MAX_LEN) { if (targetA > targetT) targetA--; else targetT--; }
            let fA = (targetA < artist.length) ? artist.substring(0, targetA - 3) + "..." : artist;
            let fT = (targetT < title.length) ? title.substring(0, targetT - 3) + "..." : title;
            return `${fA} - ${fT}`;
        }

        // --- PANSARVAGNS-INLÄSNING ---
        function processCSVData(results, fileName, displayName) {
            currentPlaylistId = fileName;
            currentPlaylistName = displayName;

            const allSongsList = document.getElementById('all-songs');
            allSongsList.innerHTML = ''; 
            document.getElementById('top-list').innerHTML = '';
            document.getElementById('bottom-list').innerHTML = '';
            document.getElementById('neutral-list').innerHTML = '';

            let addedCount = 0;

            results.data.forEach(row => {
                const lowerKeys = Object.keys(row).reduce((acc, key) => {
                    acc[key.trim().toLowerCase()] = row[key];
                    return acc;
                }, {});

                const title = lowerKeys['track name'] || lowerKeys['låtnamn'] || lowerKeys['name'] || lowerKeys['track'];
                const artist = lowerKeys['artist name(s)'] || lowerKeys['artist name'] || lowerKeys['artist'];
                const trackUri = lowerKeys['track uri'] || lowerKeys['uri'];
                
                if (!title || !artist) return; 

                addedCount++;
                let trackId = '';
                if (trackUri && trackUri.includes('spotify:track:')) trackId = trackUri.split(':')[2];
                allSongsList.appendChild(createSongElement(artist, title, trackId));
            });

            if (addedCount === 0 && results.data.length > 0) {
                const sampleRow = JSON.stringify(Object.keys(results.data[0]));
                alert(`Filen hittades, men hittade inga kolumner för låtar.\n\nDin fils rubriker:\n${sampleRow}`);
                allSongsList.innerHTML = '<div style="padding: 15px; color: #e22134;">Felaktigt format i filen. Se felmeddelandet.</div>';
            }

            updateCounters();
            saveState(); 
        }

        function loadDropdownMenu() {
            const selectEl = document.getElementById('server-list-select');
            
            fetch('dropdown.txt?t=' + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error('Filen dropdown.txt saknas');
                    return response.text();
                })
                .then(text => {
                    selectEl.innerHTML = '<option value="">-- Välj en spellista --</option>'; 
                    let optionsAdded = 0;
                    
                    const lines = text.split('\n');
                    lines.forEach(line => {
                        line = line.trim();
                        if (line) {
                            optionsAdded++;
                            let fileName = line;
                            let displayName = line;

                            if (line.includes(',')) {
                                const parts = line.split(',');
                                fileName = parts[0].trim();
                                displayName = parts[1].trim();
                            } else {
                                displayName = fileName.replace('.csv', '').replace(/[-_]/g, ' ');
                                displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                            }

                            const option = document.createElement('option');
                            option.value = fileName;
                            option.textContent = displayName;
                            selectEl.appendChild(option);
                        }
                    });

                    if (optionsAdded === 0) selectEl.innerHTML = '<option value="">(dropdown.txt är tom)</option>';

                    const lastActive = localStorage.getItem('spotifyRanking_lastActive');
                    if(lastActive && lastActive !== "default") loadState(lastActive);
                })
                .catch(err => {
                    console.log("Kunde inte ladda dropdown.txt.", err);
                    selectEl.innerHTML = '<option value="">-- dropdown.txt hittades inte --</option>';
                });
        }

        // --- UPPDATERAD SERVER-LADDNING MED EXAKTA FELMEDDELANDEN ---
        document.getElementById('server-list-select').addEventListener('change', function(event) {
            const fileName = event.target.value;
            const displayName = event.target.options[event.target.selectedIndex].text;
            
            if (!fileName) return; 
            if (loadState(fileName)) return; 

            document.getElementById('all-songs').innerHTML = '<div style="padding: 15px; color: #1DB954;">Hämtar låtar från servern...</div>';

            fetch(fileName + '?t=' + Date.now())
                .then(response => {
                    if (!response.ok) {
                        // Kasta ett fel som innehåller HTTP-statuskoden (t.ex. 404)
                        throw new Error(`Servern svarade med felkod: ${response.status}`);
                    }
                    return response.text();
                })
                .then(csvText => {
                    // Vi skickar in texten i PapaParse istället för att låta PapaParse ladda ner den
                    Papa.parse(csvText, {
                        header: true, 
                        skipEmptyLines: true, 
                        // Vi struntar i att sätta delimiter här också, så PapaParse får analysera texten fritt!
                        complete: function(results) {
                            processCSVData(results, fileName, displayName);
                        },
                        error: function(err) {
                            alert('Ett fel uppstod när texten skulle tolkas: ' + err.message);
                        }
                    });
                })
                .catch(err => {
                    console.error("Fel vid inläsning:", err);
                    alert(`Kunde inte ladda "${fileName}" från servern!\n\nDetaljer: ${err.message}\n\nTre tips att kolla upp:\n1. Kör du från din dator? Menyn funkar bara från din GitHub-länk.\n2. Ligger filen på GitHub?\n3. Viktigt: Stämmer stora/små bokstäver EXAKT överens mellan din dropdown.txt och filens faktiska namn?`);
                    document.getElementById('all-songs').innerHTML = '';
                });
        });

        document.getElementById('csv-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('server-list-select').value = ""; 

            Papa.parse(file, {
                header: true, 
                skipEmptyLines: true, 
                complete: function(results) {
                    const tempId = "local_" + file.name.replace(".csv", "");
                    const displayName = file.name.replace(".csv", "");
                    processCSVData(results, tempId, displayName);
                }
            });
            event.target.value = '';
        });

        function playSong(trackId) {
            const iframe = document.getElementById('sp-iframe');
            iframe.src = `https://open.spotify.com/embed/track/${trackId}?utm_source=generator&theme=0`;
            document.getElementById('spotify-player').style.display = 'block';
        }

        function exportAll() {
            let text = `"${currentPlaylistName}"\n\nBästa 10 låtar:\n`;
            const topSongs = document.getElementById('top-list').querySelectorAll('.song');
            topSongs.forEach((s, i) => { text += `${i + 1}, ${s.getAttribute('data-artist')}, ${s.getAttribute('data-title')}\n`; });
            text += `\nSämsta 10 låtar:\n`;
            const bottomSongs = document.getElementById('bottom-list').querySelectorAll('.song');
            bottomSongs.forEach((s, i) => { text += `${i + 1}, ${s.getAttribute('data-artist')}, ${s.getAttribute('data-title')}\n`; });

            navigator.clipboard.writeText(text).then(() => {
                alert('Allt kopierat till urklipp!\n\n' + text);
            }).catch(() => prompt('Kopiera härifrån:', text));
        }
        
        loadDropdownMenu();
        updateCounters();
    </script>
</body>
</html>
