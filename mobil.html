<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranker Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root { --spotify-green: #1DB954; --danger: #e22134; --bg: #121212; --card: #282828; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        
        /* Navigering mellan vyer */
        .view { display: none; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .view.active { display: flex; }

        h1 { font-size: 1.5rem; color: var(--spotify-green); margin-bottom: 20px; }
        .btn { background: var(--card); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1rem; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn-primary { background: var(--spotify-green); color: black; font-weight: bold; }
        .btn-danger { background: var(--danger); }

        /* Sorterings-kort (Vy 2) */
        .card { background: var(--card); padding: 30px 20px; border-radius: 15px; text-align: center; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .song-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .song-artist { font-size: 1.1rem; color: #aaa; margin-bottom: 20px; }
        
        .sort-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: auto; padding-bottom: 30px; }
        .sort-btn { border: none; padding: 20px 10px; border-radius: 12px; font-weight: bold; font-size: 0.9rem; }
        
        /* Listor (Vy 3, 4, 5) */
        .scroll-list { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; }
        .list-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #555; }
        .top-item { border-left-color: var(--spotify-green); }
        .bot-item { border-left-color: var(--danger); }

        /* Spotify Player Bar */
        #player-container { height: 80px; background: #000; margin-bottom: 20px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        
        .footer-nav { padding-top: 10px; border-top: 1px solid #333; display: flex; justify-content: space-between; }
        .small-btn { background: #333; color: #eee; border: none; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="view-home" class="view active">
        <h1>Ranker Mobile</h1>
        <select id="server-list-select">
            <option value="">Laddar menyer...</option>
        </select>
        <div style="margin-top: 20px; display: flex; flex-direction: column;">
            <button class="btn btn-primary" onclick="showView('view-sort')">🚀 Starta Sortering <span id="count-all"></span></button>
            <button class="btn" onclick="showView('view-top')">🏆 Topp 10 <span id="count-top"></span></button>
            <button class="btn" onclick="showView('view-bottom')">💩 Botten 10 <span id="count-bottom"></span></button>
            <button class="btn" onclick="showView('view-neutral')">⚙️ Menlösa <span id="count-neutral"></span></button>
            <button class="btn" style="margin-top: 20px; border: 1px solid var(--spotify-green);" onclick="exportAll()">📋 Exportera till Clipboard</button>
        </div>
    </div>

    <div id="view-sort" class="view">
        <div class="footer-nav">
            <button class="small-btn" onclick="showView('view-home')">🏠 Hem</button>
            <div id="sort-progress">0 / 0</div>
        </div>
        
        <div class="card" id="current-song-card">
            <div class="song-title" id="display-title">Laddar...</div>
            <div class="song-artist" id="display-artist">Välj en lista först</div>
            <div id="player-container">
                <iframe id="sp-iframe" src="" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
            </div>
        </div>

        <div class="sort-controls">
            <button class="sort-btn" style="background: var(--danger);" onclick="sortCurrent('bottom')">DÅLIG</button>
            <button class="sort-btn" style="background: #555; color: white;" onclick="sortCurrent('neutral')">MENLÖS</button>
            <button class="sort-btn" style="background: var(--spotify-green);" onclick="sortCurrent('top')">BRA</button>
        </div>
        <div style="display: flex; justify-content: center; gap: 20px;">
            <button class="small-btn" onclick="prevSong()">⬅️ Föregående</button>
            <button class="small-btn" onclick="nextSong()">Nästa ➡️</button>
        </div>
    </div>

    <div id="view-top" class="view">
        <h2>Topp 10</h2>
        <div id="list-top" class="scroll-list"></div>
        <div class="footer-nav">
            <button class="btn-primary" style="padding: 10px 20px;" onclick="showView('view-home')">Klar</button>
        </div>
    </div>

    <div id="view-bottom" class="view">
        <h2>Botten 10</h2>
        <div id="list-bottom" class="scroll-list"></div>
        <div class="footer-nav">
            <button class="btn-primary" style="padding: 10px 20px;" onclick="showView('view-home')">Klar</button>
        </div>
    </div>

    <div id="view-neutral" class="view">
        <h2>Menlösa</h2>
        <p style="font-size: 0.8rem; color: #888;">Klicka på en låt för att återställa den till kön.</p>
        <div id="list-neutral" class="scroll-list"></div>
        <div class="footer-nav">
            <button class="btn-primary" style="padding: 10px 20px;" onclick="showView('view-home')">Klar</button>
        </div>
    </div>

    <script>
        let songs = { queue: [], top: [], bottom: [], neutral: [] };
        let currentIndex = 0;
        let currentPlaylistName = "";

        // Vy-hantering
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'view-sort') updateSortCard();
            renderLists();
            updateCounters();
        }

        // Ladda dropdown.txt
        fetch('dropdown.txt?t=' + Date.now())
            .then(res => res.text())
            .then(text => {
                const select = document.getElementById('server-list-select');
                select.innerHTML = '<option value="">-- Välj spellista --</option>';
                text.split('\n').forEach(line => {
                    if(!line.trim()) return;
                    const [file, name] = line.includes(',') ? line.split(',') : [line, line];
                    const opt = document.createElement('option');
                    opt.value = file.trim();
                    opt.textContent = name.trim();
                    select.appendChild(opt);
                });
            });

        document.getElementById('server-list-select').onchange = (e) => {
            if(!e.target.value) return;
            currentPlaylistName = e.target.options[e.target.selectedIndex].text;
            loadCSV(e.target.value);
        };

        function loadCSV(file) {
            Papa.parse(file + '?t=' + Date.now(), {
                download: true,
                header: true,
                complete: (results) => {
                    songs.queue = results.data.filter(r => r['Track Name']).map(r => ({
                        title: r['Track Name'],
                        artist: r['Artist Name(s)'] || r['Artist Name'],
                        id: r['Track URI'] ? r['Track URI'].split(':')[2] : null
                    }));
                    songs.top = []; songs.bottom = []; songs.neutral = [];
                    currentIndex = 0;
                    updateCounters();
                    alert("Laddat " + songs.queue.length + " låtar!");
                }
            });
        }

        function updateSortCard() {
            const song = songs.queue[currentIndex];
            if(!song) {
                document.getElementById('display-title').innerText = "Slut på låtar!";
                document.getElementById('display-artist').innerText = "Gå till rankning eller välj ny lista.";
                document.getElementById('sp-iframe').src = "";
                return;
            }
            document.getElementById('display-title').innerText = song.title;
            document.getElementById('display-artist').innerText = song.artist;
            document.getElementById('sort-progress').innerText = `${currentIndex + 1} / ${songs.queue.length}`;
            if(song.id) document.getElementById('sp-iframe').src = `https://open.spotify.com/embed/track/${song.id}`;
        }

        function sortCurrent(category) {
            if(!songs.queue[currentIndex]) return;
            const song = songs.queue.splice(currentIndex, 1)[0];
            songs[category].push(song);
            updateSortCard();
            updateCounters();
        }

        function nextSong() { if(currentIndex < songs.queue.length - 1) { currentIndex++; updateSortCard(); } }
        function prevSong() { if(currentIndex > 0) { currentIndex--; updateSortCard(); } }

        function updateCounters() {
            document.getElementById('count-all').innerText = `(${songs.queue.length})`;
            document.getElementById('count-top').innerText = `(${songs.top.length})`;
            document.getElementById('count-bottom').innerText = `(${songs.bottom.length})`;
            document.getElementById('count-neutral').innerText = `(${songs.neutral.length})`;
        }

        function renderLists() {
            const render = (containerId, list, type) => {
                const el = document.getElementById(containerId);
                el.innerHTML = '';
                list.forEach((s, i) => {
                    const item = document.createElement('div');
                    item.className = `list-item ${type}-item`;
                    item.innerHTML = `<span>${i+1}. ${s.artist} - ${s.title}</span>`;
                    if(type === 'neutral') {
                        item.onclick = () => {
                            songs.queue.push(list.splice(i, 1)[0]);
                            renderLists(); updateCounters();
                        };
                    }
                    el.appendChild(item);
                });
            };
            render('list-top', songs.top, 'top');
            render('list-bottom', songs.bottom, 'bot');
            render('list-neutral', songs.neutral, 'neutral');
        }

        // Aktivera Drag & Drop för Topp och Botten
        new Sortable(document.getElementById('list-top'), { animation: 150, onEnd: (evt) => {
            const item = songs.top.splice(evt.oldIndex, 1)[0];
            songs.top.splice(evt.newIndex, 0, item);
        }});
        new Sortable(document.getElementById('list-bottom'), { animation: 150, onEnd: (evt) => {
            const item = songs.bottom.splice(evt.oldIndex, 1)[0];
            songs.bottom.splice(evt.newIndex, 0, item);
        }});

        function exportAll() {
            let text = `"${currentPlaylistName}"\n\nBästa 10:\n`;
            songs.top.slice(0,10).forEach((s, i) => text += `${i+1}, ${s.artist}, ${s.title}\n`);
            text += `\nSämsta 10:\n`;
            songs.bottom.slice(0,10).forEach((s, i) => text += `${i+1}, ${s.artist}, ${s.title}\n`);
            
            navigator.clipboard.writeText(text).then(() => alert("Kopierat till clipboard!"));
        }
    </script>
</body>
</html>
